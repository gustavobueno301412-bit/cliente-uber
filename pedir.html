<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Corrida 🚘</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }

        h2 { margin-bottom: 30px; font-weight: 600; text-align: center; color: #333; }

        .input-group { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #eef0f2;
            border-radius: 12px;
            background: #fdfdfd;
            color: #333;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
            transition: border 0.3s;
        }

        input:focus { border: 1.5px solid #25D366; }

        button {
            width: 100%;
            padding: 16px;
            background: #25D366;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #128C7E; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Solicitar Corrida 🚘</h2>
       
        <div class="input-group"><input type="text" id="nome" placeholder="👤 Nome do passageiro"></div>
        <div class="input-group"><input type="text" id="origem" placeholder="📍 Endereço de partida"></div>
        <div class="input-group"><input type="text" id="destino" placeholder="🏁 Para onde vai?"></div>
        <div class="input-group"><input type="text" id="referencia" placeholder="🏠 Ponto de referência"></div>

        <button onclick="enviarWhatsApp()">Solicitar Motorista 💬</button>
    </div>

    <script>
        // --- COLOQUE O NÚMERO DO MOTORISTA AQUI ---
        const WHATSAPP_MOTORISTA = "5512992448264";

        function enviarWhatsApp() {
            const nome = document.getElementById('nome').value;
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;
            const ref = document.getElementById('referencia').value;

            if(!nome || !origem || !destino) {
                alert("Por favor, preencha os campos principais.");
                return;
            }

            const mensagem = `*Solicitação de Nova Corrida* 🚘%0A%0A` +
                             `👤 Nome: ${nome}%0A` +
                             `📍 Partida: ${origem}%0A` +
                             `🏁 Destino: ${destino}%0A` +
                             `🏠 Ref: ${ref}`;

            const url = `https://wa.me/${WHATSAPP_MOTORISTA}?text=${mensagem}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
