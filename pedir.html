<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Corrida 🚘</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 600;
            text-align: center;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #eef0f2;
            border-radius: 12px;
            background: #fdfdfd;
            color: #333;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
            transition: border 0.3s;
        }

        input:focus { border: 1.5px solid #007bff; }

        button {
            width: 100%;
            padding: 16px;
            background: #007bff;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover { background: #0056b3; }

        .status-msg {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Solicitar Corrida 🚘</h2>
       
        <div class="input-group">
            <input type="text" id="nome" placeholder="👤 Seu Nome">
        </div>
        <div class="input-group">
            <input type="text" id="whatsapp" placeholder="📱 WhatsApp (com DDD)">
        </div>
        <div class="input-group">
            <input type="text" id="origem" placeholder="📍 Endereço de partida">
        </div>
        <div class="input-group">
            <input type="text" id="destino" placeholder="🏁 Para onde vai?">
        </div>
        <div class="input-group">
            <input type="text" id="referencia" placeholder="🏠 Ponto de referência">
        </div>

        <button onclick="enviarPedido()">Solicitar Motorista</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        const URL_API = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI";

        function enviarPedido() {
            const btn = document.querySelector('button');
            const statusDiv = document.getElementById('status');
           
            const dados = {
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                origem: document.getElementById('origem').value,
                destino: document.getElementById('destino').value,
                referencia: document.getElementById('referencia').value
            };

            if(!dados.nome || !dados.whatsapp || !dados.origem || !dados.destino) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            btn.innerText = "Enviando...";
            btn.disabled = true;

            fetch(URL_API + "?acao=fazerPedido", {
                method: "POST",
                mode: 'no-cors',
                body: JSON.stringify(dados)
            })
            .then(() => {
                statusDiv.innerText = "✅ Pedido enviado com sucesso!";
                btn.innerText = "Solicitar Motorista";
                btn.disabled = false;
                // Limpar inputs
                document.querySelectorAll('input').forEach(input => input.value = '');
            })
            .catch(() => {
                statusDiv.innerText = "❌ Erro ao enviar. Tente novamente.";
                btn.innerText = "Solicitar Motorista";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
