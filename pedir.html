<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamar Motorista 🚘</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            color: #fff;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
            transition: border 0.3s;
        }

        input:focus { border: 1px solid #4facfe; }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, filter 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* Feedback visual */
        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Solicitar Corrida 🚘</h2>
       
        <div class="input-group">
            <input type="text" id="nome" placeholder="Seu Nome">
        </div>
        <div class="input-group">
            <input type="text" id="origem" placeholder="Endereço de partida">
        </div>
        <div class="input-group">
            <input type="text" id="destino" placeholder="Para onde vai?">
        </div>
        <div class="input-group">
            <input type="text" id="referencia" placeholder="Ponto de referência">
        </div>

        <button onclick="enviarPedido()">Solicitar Motorista 🚘</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // --- COLOQUE SUA URL DO GOOGLE SCRIPT AQUI ---
        const URL_API = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI";

        function enviarPedido() {
            const btn = document.querySelector('button');
            const statusDiv = document.getElementById('status');
           
            const dados = {
                nome: document.getElementById('nome').value,
                origem: document.getElementById('origem').value,
                destino: document.getElementById('destino').value,
                referencia: document.getElementById('referencia').value
            };

            if(!dados.nome || !dados.origem || !dados.destino) {
                alert("Por favor, preencha os campos obrigatórios.");
                return;
            }

            // Feedback visual
            btn.innerText = "Enviando...";
            btn.disabled = true;

            fetch(URL_API + "?acao=fazerPedido", {
                method: "POST",
                mode: 'no-cors', // Importante para evitar bloqueios do Google
                body: JSON.stringify(dados)
            })
            .then(() => {
                statusDiv.innerText = "✅ Pedido enviado com sucesso!";
                btn.innerText = "Solicitar Motorista";
                btn.disabled = false;
                // Limpa campos
                document.getElementById('nome').value = '';
                document.getElementById('origem').value = '';
                document.getElementById('destino').value = '';
                document.getElementById('referencia').value = '';
            })
            .catch(err => {
                statusDiv.innerText = "❌ Erro ao enviar. Tente novamente.";
                btn.innerText = "Solicitar Motorista";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
